{% extends "layout.html" %}

{% block body %}

    <h2>U have ordered these below !</h2>
    <div>
<form method="GET">

    <table class="table table-striped ">
        <thead>
            <tr>
                <th>#</th>
                <th>Date</th>
                <th>Backeries</th>
                <th>Quantity</th>
            </tr>
        </thead>
        {% for order in orders %}
        <tbody>
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ order.date }}</td>
                <td>{{ order.product_name }}</td>
                <td>{{ order.quantity }}</td>
            </tr>
        </tbody>
        {% endfor %}
    </table>
</form>
<div class="d-flex justify-content-between align-items-center py-4 px-3">

    <!-- left -->
    <a href="/" class="btn btn-outline-secondary">
        ← Home
    </a>

    <!-- middle -->
    <a href="/stats?date={{ order_date }}" class="btn btn-primary">
        View Stats
    </a>

    <!-- right -->
    <a href="/dailysale?date={{ order_date }}" class="btn btn-outline-secondary">
        Check Sales →
    </a>

</div>

 </div>

</div>
{% endblock %}
