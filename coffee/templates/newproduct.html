{% extends "layout.html" %}

{% block body %}
<h1>Creat a new product! </h1>

<div class="b-example-divider"></div>
<form action="/newproduct" method="post">

    <table class="table table-striped ">
        <thead>
            <tr>
                <th>Products</th>
                <th>Category</th>
                <th>Price</th>
                <th>Sell Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <input name="name" type="text" autofocus autocomplete="off" placeholder="Name">
                </td>

                <td>
                    <select name="category">
                        <option selected value="">Not selected</option>
                        {% for category in categories %}
                        <option name="category" value="{{category}}">{{category}}</option>
                        {% endfor %}
                    </select>
                </td>
                <td>
                    <input
                    name="price"
                    type="number"
                    step="0.01"
                    value=""
                    placeholder="Enter price in Euro">
                </td>
                <td>
                    <input
                    name="sell_price"
                    type="number"
                    step="0.01"
                    value=""
                    placeholder="Enter sell price in Euro">
            </tr>
        </tbody>
    </table>

    <button class="badge text-bg-success rounded-pill" type="submit">Create</button>
    <ul>
        {% for name, category, price in newproductsindex %}
        <li>{{name}}</li>
        <li>{{category}}</li>
        <li>{{price}}</li>
        {% endfor %}
    </ul>

{% endblock %}
