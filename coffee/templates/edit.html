{% extends "layout.html" %}

{% block body %}
<h1>Edit PAGE</h1>
<div class="b-example-divider"></div>
<form action="/result" method="post">

    <table class="table table-striped ">
        <thead>
            <tr>
                <th>Products</th>
                <th>Category</th>
                <th>Price</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody>
        {% for product in products %}

            <tr>
                <td>{{ product.name }}</td>
                <td>
                    <select name="{{ product.category }}_confirm">
                        <option selected value="">Not selected</option>
                        {% for category in categories %}
                        <option value="{{category}}">{{category}}</option>
                        {% endfor %}
                    </select>
                </td>
                <td>
                    <input
                    name="{{ product.name }}_price"
                    type="number"
                    step="0.01"
                    value="{{ product.price }}">
                </td>
                <td>
                    <form action="/edit" method="post">
                        <input name="id" type="hidden" value="{{ product.id }}">
                        <button class="badge text-bg-danger rounded-pill">Delete</button>
                    </form>
                </td>
            </tr>

        {% endfor %}
        </tbody>
    </table>
    <button type="submit">Submit</button>

</form>


<form action="/date">
    <button class="badge text-bg-primary rounded-pill">Review sale</button>
</form>

{% endblock %}
