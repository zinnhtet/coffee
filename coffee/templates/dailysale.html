{% extends "layout.html" %}

{% block body %}

    <h2>Its a daily sale </h2>
    <div>
        <form action="/dailysale?date={{ order_date }}" method="POST">
    <table class="table table-striped ">
        <thead>
            <tr><th>#</th>
                <th>Date</th>
                <th>Backeries</th>
                <th>Leftover </th>
            </tr>
        </thead>
        {% for order in orders %}
        <tbody>
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ order.date }}</td>
                <td>{{ order.product_name }}</td>
                <td>
                    <input name="leftover_{{ order.id }}" type="number" placeholder = "{{ order.quantity }}">
                </td>
                <td><input type="hidden" name="product_id_{{ order.id }}" value="{{ order.product_id }}"></td>

            </tr>
        </tbody>
        {% endfor %}
    </table>

</div>
 <!-- buttons INSIDE the form -->
        <div class="d-flex justify-content-between align-items-center py-4 px-3">
            <a href="/" class="btn btn-outline-secondary">← Home</a>
            <a href="/stats?date={{ order_date }}" class="btn btn-primary">View Stats</a>
            <button type="submit" class="btn btn-success">Calculate →</button>
        </div>


</form>
<a href="/stats?date={{ order_date }}">View Stats</a>
<button href="/">Go back to home page</button>

{% endblock %}
